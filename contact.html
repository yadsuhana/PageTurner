    /* Critical CSS */
    body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; background-color: #faf6f3; color: #3d2c2c; }
    header { background: linear-gradient(180deg, #5c2e2e 0%, #4a2525 100%); color: #f8f4f0; padding: 1rem; text-align: center; }
    main.container { width: 90%; max-width: 1200px; margin: 0 auto; padding: 1.5rem 0; }

<body>

  <header>
    <h1>PageTurner</h1>
    <nav aria-label="Main navigation">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="product.html">Product</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main class="container">
    <section class="three-columns">
      <article class="column">
        <h2>Contact Us</h2>
        <form action="#" method="get" aria-label="Contact form">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required autocomplete="name">

          <label for="email">Email</label>
          <input type="email" id="email" name="email" required autocomplete="email">

          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5"></textarea>

          <button type="submit">Send</button>
        </form>
      </article>
    </section>
  </main>

  <footer>
    <div class="footer-columns">
      <div>
        <p>© 2026 PageTurner. All rights reserved.</p>
      </div>
      <div>
        <h4>Feedback</h4>
        <p>Email: <a href="mailto:suhana@booknest.com">suhanas@booknest.com</a></p>
      </div>
      <div>
        <h4>Follow Us</h4>
        <p>
          <a href="#" aria-label="Facebook">Facebook</a> |
          <a href="#" aria-label="Instagram">Instagram</a> |
          <a href="#" aria-label="Twitter">Twitter</a>
        </p>
      </div>
    </div>
  </footer>
